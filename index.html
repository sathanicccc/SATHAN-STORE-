<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SATHAN STORE | Premium Android Hub</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div id="splash">
    <div class="splash-content">
        <h1 class="logo-text">SATHAN <span>STORE</span></h1>
        <div class="loading-bar"></div>
    </div>
</div>

<header>
    <nav>
        <div class="logo">SATHAN <span>STORE</span></div>
        <div class="search-wrapper">
            <input type="text" id="searchInput" placeholder="Search Apps or Games..." onkeyup="if(event.key==='Enter') searchApps()">
            <button onclick="searchApps()"><i class="fas fa-search"></i></button>
        </div>
    </nav>
</header>

<main class="container">
    <div id="status-msg">Trending Apps for You</div>
    <div id="app-grid" class="app-grid">
        </div>
</main>

<div id="appModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div id="modalBody"></div>
    </div>
</div>

<footer>
    <p>&copy; 2026 SATHAN STORE | Fast & Secure Downloads</p>
</footer>

<script src="script.js"></script>
</body>
</html>
